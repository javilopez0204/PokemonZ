name: Reindex

# Lanza manualmente para reconstruir el índice FAISS a partir del PDF en GCS.
# Sube índice y chunks al bucket; Cloud Run lo recogerá en el siguiente cold start.

on:
  workflow_dispatch:
    inputs:
      pdf_blob:
        description: "Nombre del blob del PDF en el bucket"
        required: false
        default: "GuiaPokemonZ.pdf"

permissions:
  contents: read
  id-token: write

jobs:
  reindex:
    runs-on: ubuntu-latest
    env:
      REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r backend/requirements.txt
        # numpy/faiss/google-cloud-storage llegan vía requirements

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SERVICE_ACCOUNT }}

      - name: Run indexer
        working-directory: backend
        env:
          GCP_PROJECT:    ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET:     ${{ secrets.GCS_BUCKET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PDF_BLOB:       ${{ inputs.pdf_blob }}
        run: python -m indexer.build_index

      - name: Force new Cloud Run revision
        run: |
          gcloud run services update pokez-api \
            --region=${REGION} \
            --update-labels=reindex=$(date +%s)
